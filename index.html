<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Typing Indo Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="lessonList"></div>

  <!-- MAIN -->
  <div class="main">
    <h2 id="lessonTitle"></h2>

    <div class="stats">
      <span>WPM: <b id="wpm">0</b></span>
      <span>Time: <b id="time">0</b></span>
      <span>Akurasi: <b id="accuracy">100%</b></span>
    </div>

    <div id="text"></div>

    <textarea id="input" placeholder="mulai mengetik..."></textarea>

    <!-- KEYBOARD -->
    <div class="keyboard" id="keyboard"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
